<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Billing System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } body { background: white; } .print-area { box-shadow: none; border: none; } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen p-4 md:p-10">

    <div class="max-w-4xl mx-auto glass rounded-2xl p-8 shadow-2xl print-area bg-white text-slate-900 md:text-inherit">
        <div class="flex justify-between items-start mb-10 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-cyan-400">INVOICE</h1>
                <input type="text" placeholder="Your Company Name" class="bg-transparent border-none text-xl mt-2 block outline-none">
            </div>
            <div class="text-right">
                <p class="text-sm text-slate-400">Date: <span id="currentDate"></span></p>
                <input type="text" placeholder="INV-001" class="bg-transparent border-none text-right block outline-none text-slate-400">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-8 mb-10">
            <div>
                <h3 class="text-xs uppercase tracking-widest text-slate-500 mb-2">Bill To:</h3>
                <textarea placeholder="Client Name & Address" class="bg-transparent border-none w-full h-20 outline-none resize-none"></textarea>
            </div>
        </div>

        <table class="w-full mb-8">
            <thead>
                <tr class="text-left border-b border-slate-700 text-slate-400 text-sm uppercase">
                    <th class="py-3">Description</th>
                    <th class="py-3 text-center">Qty</th>
                    <th class="py-3 text-right">Price</th>
                    <th class="py-3 text-right">Total</th>
                </tr>
            </thead>
            <tbody id="billBody">
                <tr class="border-b border-slate-800/50">
                    <td class="py-4"><input type="text" placeholder="Service/Item Name" class="bg-transparent w-full outline-none"></td>
                    <td class="py-4"><input type="number" value="1" oninput="updateTotal()" class="qty bg-transparent w-full text-center outline-none"></td>
                    <td class="py-4"><input type="number" value="0" oninput="updateTotal()" class="price bg-transparent w-full text-right outline-none"></td>
                    <td class="py-4 text-right font-semibold row-total">0.00</td>
                </tr>
            </tbody>
        </table>

        <div class="no-print flex gap-4 mb-8">
            <button onclick="addRow()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm transition">+ Add Line</button>
        </div>

        <div class="flex justify-end border-t border-slate-700 pt-6">
            <div class="w-64">
                <div class="flex justify-between mb-2">
                    <span class="text-slate-400">Subtotal</span>
                    <span id="subtotal">0.00</span>
                </div>
                <div class="flex justify-between mb-4">
                    <span class="text-slate-400">Tax (0%)</span>
                    <span>0.00</span>
                </div>
                <div class="flex justify-between text-xl font-bold text-cyan-400">
                    <span>Grand Total</span>
                    <span id="grandTotal">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <button onclick="window.print()" class="no-print fixed bottom-8 right-8 bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-3 rounded-full font-bold shadow-lg transition transform hover:scale-105">
        Download / Print PDF
    </button>

    <script>
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString();

        function addRow() {
            const row = `
            <tr class="border-b border-slate-800/50">
                <td class="py-4"><input type="text" placeholder="Service/Item Name" class="bg-transparent w-full outline-none"></td>
                <td class="py-4"><input type="number" value="1" oninput="updateTotal()" class="qty bg-transparent w-full text-center outline-none"></td>
                <td class="py-4"><input type="number" value="0" oninput="updateTotal()" class="price bg-transparent w-full text-right outline-none"></td>
                <td class="py-4 text-right font-semibold row-total">0.00</td>
            </tr>`;
            document.getElementById('billBody').insertAdjacentHTML('beforeend', row);
        }

        function updateTotal() {
            let subtotal = 0;
            document.querySelectorAll('#billBody tr').forEach(row => {
                const qty = row.querySelector('.qty').value || 0;
                const price = row.querySelector('.price').value || 0;
                const total = qty * price;
                row.querySelector('.row-total').innerText = total.toFixed(2);
                subtotal += total;
            });
            document.getElementById('subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('grandTotal').innerText = subtotal.toFixed(2);
        }
    </script>
</body>
</html>
